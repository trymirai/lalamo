[tox]
requires = tox>=4.21
env_list = user-install-{cpu,gpu}
skip_missing_interpreters = true

[testenv]
basepython = python3.14
package = skip
recreate = true
passenv =
    HF_*
    CUDA_*
    XLA_*
    JAX_*
    TORCH_*
setenv =
    UV_NO_SYNC = 1
    HF_XET_HIGH_PERFORMANCE = 1
    XLA_DETERMINISTIC_OPS = true
    cpu: CUDA_VISIBLE_DEVICES = ""
    cpu: JAX_PLATFORMS = cpu
    gpu: CUDA_VISIBLE_DEVICES = 0
    gpu: JAX_PLATFORMS = cuda
# Test deps are declared here rather than via the dev group so that the
# user-install envs (plain pip, no dev group) can still run the suite.
deps =
    pytest
    pytest-xdist
    hypothesis
allowlist_externals =
    uv
    bash
    grep
commands_pre =
    cpu: python -m pip install .
    gpu: python -m pip install ".[cuda,server]"
commands =
    cpu: pytest tests/unit
    gpu: pytest -n=2 tests/unit tests/cli
    bash -c 'MODEL="google/gemma-3-1b-it" && \
        lalamo list-models | grep " $MODEL " && \
        lalamo list-models --plain | grep -x "$MODEL" && \
        lalamo list-models --no-plain | grep " $MODEL " && \
        lalamo convert "$MODEL" && \
        lalamo chat "models/gemma-3-1b-it" --message "What is 2 + 2? Reply with a single number, nothing else." --max-tokens 4 --temperature 0 | grep -x "4"'

[testenv:user-install-cpu]
description = User install (plain pip) against latest CPU deps
commands_pre = python -m pip install "."

[testenv:user-install-gpu]
description = User install (plain pip) against latest CUDA deps
commands_pre = python -m pip install ".[cuda,server]"
