name: "Tests (Prerelease)"

on:
  pull_request:
    # Include label changes so prerelease jobs start as soon as label is added.
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled, closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-prerelease-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # For pipefail - https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#exit-codes-and-error-action-preference
    shell: bash

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

jobs:
  config:
    uses: ./.github/workflows/config.yml

  conversion-and-coherence:
    name: Conversion & Coherence
    runs-on: [github-n2hmem32]
    needs: [config]
    if: ${{ needs.config.outputs.run-tests == 'true' && needs.config.outputs.is-prerelease == 'true' }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run pytest
        run: |
          pytest tests/conversion tests/coherence -n 4

  latest-deps:
    name: "Latest Deps: ${{ matrix.suite }} (${{ matrix.device }}) / ${{ matrix.python }}"
    runs-on: ${{ fromJSON(matrix.runner) }}
    needs: [config]
    if: ${{ needs.config.outputs.run-tests == 'true' && needs.config.outputs.is-prerelease == 'true' }}

    strategy:
      fail-fast: false
      matrix:
        python: ${{ fromJSON(needs.config.outputs.latest-deps-python-versions) }}
        device: [cpu, gpu]
        include:
          - device: cpu
            runner: '["ubuntu-latest"]'
          - device: gpu
            runner: '["self-hosted", "linux", "gpu"]'
          - python: py313
            python-version: '3.13'
          - python: py314
            python-version: '3.14'

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: ./.github/actions/setup
        with:
          install-dependencies: 'false'

      - name: Run tox
        run: |
          uvx tox -e latest-deps-${{ matrix.device }}-${{ matrix.python }}
