name: "Tests (Prerelease)"

on:
  pull_request:
    # Include label changes so prerelease jobs start as soon as label is added.
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled, closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-prerelease-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # For pipefail - https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#exit-codes-and-error-action-preference
    shell: bash

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

jobs:
  config:
    uses: ./.github/workflows/config.yml

  coherence-small:
    name: "Coherence (small)"
    runs-on: [github-n2hmem16]
    needs: [config]
    if: ${{ needs.config.outputs.run-tests == 'true' && needs.config.outputs.is-prerelease == 'true' }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run pytest
        run: |
          pytest tests/coherence -m small_model -vs

  coherence-large:
    name: "Coherence (large)"
    runs-on: [github-n2hmem32]
    needs: [config]
    if: ${{ needs.config.outputs.run-tests == 'true' && needs.config.outputs.is-prerelease == 'true' }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run pytest
        run: |
          pytest tests/coherence -m large_model -vs

  tts-coherence:
    name: "TTS Coherence"
    runs-on: [github-n2hmem16]
    needs: [config]
    if: ${{ needs.config.outputs.run-tests == 'true' && needs.config.outputs.is-prerelease == 'true' }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run pytest
        run: |
          pytest tests/coherence/test_tts_coherence.py

  user-install:
    name: "User Install (${{ matrix.device }})"
    runs-on: ${{ fromJSON(matrix.runner) }}
    needs: [config]
    if: ${{ needs.config.outputs.run-tests == 'true' && needs.config.outputs.is-prerelease == 'true' }}

    strategy:
      fail-fast: false
      matrix:
        device: [cpu, gpu]
        include:
          - device: cpu
            runner: '["github-n2hmem16"]' # ubuntu-latest does not have enough RAM (?) to run these
          - device: gpu
            runner: '["self-hosted", "linux", "gpu"]'

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - uses: ./.github/actions/setup
        with:
          install-dependencies: 'false'
          dev: 'true'
          cuda: ${{ matrix.device == 'gpu' && 'true' || 'false' }}

      - name: Run tox
        run: |
          uvx tox -e user-install-${{ matrix.device }}
