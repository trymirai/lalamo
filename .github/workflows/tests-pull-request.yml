name: "Tests (Pull Request)"

on:
  push:
    branches:
      - main
  pull_request:
    # Run on key PR events; heavyweight jobs are gated by job-level `if:`.
    types: [opened, reopened, ready_for_review, synchronize, closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # For pipefail - https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#exit-codes-and-error-action-preference
    shell: bash

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

jobs:
  unit:
    name: Unit Tests
    runs-on: [github-n2hmem16]

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run pytest
        run: |
          pytest -n=auto tests/unit

  config:
    uses: ./.github/workflows/config.yml

  linters:
    name: Linters
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - id: setup
        uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run pyrefly
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: |
          pyrefly check

      - name: Run ruff
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: |
          ruff check .

      - name: Run ruff format
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: |
          ruff format --check .

      - name: Check that uv.lock is up-to-date
        if: ${{ always() && steps.setup.outcome == 'success' }}
        run: |
          uv lock --check
          git diff --exit-code -- uv.lock

  model-tests:
    name: "Model: ${{ matrix.repo }}"
    runs-on: [github-n2hmem16]
    needs: [unit, config]
    if: ${{ needs.config.outputs.run-tests == 'true' }}

    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.config.outputs.core-lm-repos) }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run pytest
        run: |
          pytest tests/generation tests/tracer -k "${{ matrix.repo }}"

  audio:
    name: Audio Models
    runs-on: [github-n2hmem16] # prefer cpu, gpu is flaky
    needs: [unit, config]
    if: ${{ needs.config.outputs.run-tests == 'true' }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run pytest
        run: |
          pytest tests/tts

  cli:
    name: CLI tests
    runs-on: [github-n2hmem16]
    needs: [unit, config]
    if: ${{ needs.config.outputs.run-tests == 'true' }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run tests
        run: |
          pytest tests/tracer

  cli:
    name: CLI
    runs-on: ubuntu-latest
    needs: [unit, config]
    if: ${{ needs.config.outputs.run-tests == 'true' }}

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          dev: 'true'

      - name: Run pytest
        run: |
          pytest tests/cli
