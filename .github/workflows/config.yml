name: "Setup conditionals"

permissions: {}

on:
  workflow_call:
    outputs:
      run-tests:
        description: "Whether to run heavyweight test jobs"
        value: ${{ jobs.config.outputs.run-tests }}
      is-prerelease:
        description: "Whether the PR has the prerelease label"
        value: ${{ jobs.config.outputs.is-prerelease }}
      latest-deps-python-versions:
        description: "JSON array of Python versions for latest-deps testing"
        value: ${{ jobs.config.outputs.latest-deps-python-versions }}
      core-lm-repos:
        description: "JSON array of CORE-tier language-model repos (one matrix shard per repo)"
        value: ${{ jobs.config.outputs.core-lm-repos }}

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      run-tests: ${{ github.event_name != 'pull_request' || (github.event.action != 'closed' && github.event.pull_request.draft == false) }}
      is-prerelease: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'prerelease') }}
      latest-deps-python-versions: ${{ (github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'prerelease')) && '["py313", "py314"]' || '["py314"]' }}
      core-lm-repos: ${{ steps.discover.outputs.core-lm-repos }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - id: discover
        run: |
          echo -n "core-lm-repos=" >> "$GITHUB_OUTPUT"
          python -c "
          import json
          from lalamo.model_import.model_specs.common import ModelType
          from lalamo.model_registry import ModelRegistry
          from tests.model_test_tiers import TIER_BY_REPO, ModelTier
          repos = [
              s.repo for s in ModelRegistry.build(allow_third_party_plugins=False).models
              if s.model_type == ModelType.LANGUAGE_MODEL
              and TIER_BY_REPO.get(s.repo, ModelTier.EXTRA) <= ModelTier.CORE
          ]
          print(json.dumps(repos))
          " >> "$GITHUB_OUTPUT"
