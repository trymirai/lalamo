name: "Setup conditionals"

permissions:
  contents: read

on:
  workflow_call:
    outputs:
      run-tests:
        description: "Whether to run heavyweight test jobs"
        value: ${{ jobs.config.outputs.run-tests }}
      is-prerelease:
        description: "Whether the PR has the prerelease label"
        value: ${{ jobs.config.outputs.is-prerelease }}
      latest-deps-python-versions:
        description: "JSON array of Python versions for latest-deps testing"
        value: ${{ jobs.config.outputs.latest-deps-python-versions }}
      core-lm-repos:
        description: "JSON array of CORE-tier language-model repos (one matrix shard per repo)"
        value: ${{ jobs.config.outputs.core-lm-repos }}

jobs:
  config:
    runs-on: ubuntu-latest
    outputs:
      run-tests: ${{ github.event_name != 'pull_request' || (github.event.action != 'closed' && github.event.pull_request.draft == false) }}
      is-prerelease: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'prerelease') }}
      core-lm-repos: ${{ steps.model-test-matrix.outputs.core-lm-repos }}
    steps:
      - uses: actions/checkout@v6
      - id: model-test-matrix
        run: |
          echo -n "core-lm-repos=" >> "$GITHUB_OUTPUT"
          python -c 'import json, tomllib; tiers=tomllib.load(open("tests/model_test_tiers.toml", "rb"))["tiers"]; print(json.dumps(tiers["canonical"] + tiers["core"]))' >> "$GITHUB_OUTPUT"
